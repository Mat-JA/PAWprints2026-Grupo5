<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="/estilos/base.css">
    <title>PawPrints - Registrate</title>
</head>

<body>
    <header>
        <div class="header-top">
            <a href="/index.html">
                <img src="/imagenes/logo.svg" alt="PawPrints">
            </a>

            <form role="search">
                <input id="busqueda" type="search" placeholder="Buscar libros...">
                <button type="submit">Buscar</button>
            </form>

            <div class="links-header">
                <a href="/carrito.html">
                    <img src="/imagenes/carrito_logo_darkmode.svg" alt="carrito de compras">
                </a>

                <a href="/mi_cuenta.html">
                    <img src="/imagenes/mi_cuenta_logo_darkmode.svg" alt="acceso a mi cuenta">
                </a>
            </div>
        </div>

        <nav aria-label="Navegación principal">
            <ul>
                <li><a href="/catalogo.html">Libros</a></li>
                <li><a href="/novedades.html">Novedades</a></li>
                <li><a href="/top_50.html">Top 50</a></li>
                <li><a href="/locales.html">Locales</a></li>
                <li><a href="/contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <header>
                <h1>Registrarme</h1>
            </header>

            <form action="" method="post">
                <label for="email">Correo electronico:</label>
                <input type="email" id="email" autofocus>
                <br>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required>
                <br>
                <label for="confirmar">Confirmar contraseña:</label>
                <input type="password" id="confirmar" required>
                <br>
                <button type="submit">Crear cuenta</button>
                <br>
            </form>
        </section>
    </main>
    <footer>
        <a href="/nosotros.html">Acerca de nosotros</a>
        <section>
            <h2>Info de contacto</h2>
            <address>
                <a href="mailto:libreria@pawprints.com">libreria@pawprints.com</a> <br />
                <span>+54 2323 123456</span> <br />
                Tambien podes visitarnos en: <br />
                <em>
                    Calle falsa 123 <br />
                    Lujan, Buenos Aires <br />
                    CP: 6700
                </em>
            </address>
        </section>
        <nav aria-label="Redes sociales">
            <strong>Nuestras Redes:</strong> <br>
            <a href="https://instagram.com/PAWPrints_libreria"><em>Instagram</em></a> <br>
            <a href="https://facebook.com/PAWPrints.libreria"><em>Facebook</em></a>
        </nav>
    </footer>
</body>

</html>
