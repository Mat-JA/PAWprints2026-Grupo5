services:
  db:
    image: postgres:16-alpine
    container_name: paw-prints-db
    environment:
      POSTGRES_DB: pawprintsdb
      POSTGRES_USER: paw
      POSTGRES_PASSWORD: paw
    ports:
      - "5433:5432"
    volumes:
      # - ./db-init:/docker-entrypoint-initdb.d:ro,Z
      - pawprints_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paw -d pawprintsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      # Se monta el código en tiempo real, elimina necesidad de rebuild por cambio en el código
      - .:/var/www/html:rw
    environment:
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy
volumes:
  pawprints_postgres_data:
