        <form name="barra de busqueda">
            <input type="search" placeholder="Buscar libros...">
            <button type="submit">Buscar</button>
        </form>

        <a href="/carrito.html">
            <img src="/imagenes/carrito_logo.png" alt="carrito">
        </a>

        <a href="/mi_cuenta.html">
            <img src="/imagenes/mi_cuenta_logo.png" alt="mi cuenta">
        </a>

        <nav>
            <ul>
                <li><a href="/catalogo.html">Libros</a></li>
                <li><a href="/novedades.html">Novedades</a></li>
                <li><a href="/top_50.html">Top 50</a></li>
                <li><a href="/locales.html">Locales</a></li>
                <li><a href="/contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Nuestros libros</h2>
            <article>
                <h3>Titulo</h3>
                <a href="detalle_libro1.html">
                    <img src="imagenes/libro1.jpg">
                </a>
                <p>Autor del libro</p>
                <p>$precio</p>
                <button>Agregar al carrito</button>
            </article>
      
            <article>
                <h3>Titulo</h3>
                <a href="detalle_libro2.html">
                    <img src="imagenes/libro2.jpg">
                </a>
                <p>Autor del libro</p>
                <p>$precio</p>
                <button>Agregar al carrito</button>
            </article>

            <article>
                <h3>Titulo</h3>
                <a href="detalle_libro3.html">
                    <img src="imagenes/libro3.jpg">
                </a>
                <p>Autor del libro</p>
                <p>$precio</p>
                <button>Agregar al carrito</button>
            </article>
        </section>

        <aside>
            <details>
              <summary>Filtros</summary>
          
              <form>
                <fieldset>
                  <legend>Precio</legend>
          
                  <label>
                    <input type="checkbox" name="precio" value="bajo">
                    Menos de $5000
                  </label>
          
                  <label>
                    <input type="checkbox" name="precio" value="alto">
                    Más de $5000
                  </label>
                </fieldset>
          
                <fieldset>
                  <legend>Género</legend>
          
                  <label>
                    <input type="checkbox" name="genero" value="fantasia">
                    Fantasía
                  </label>
          
                  <label>
                    <input type="checkbox" name="genero" value="ciencia">
                    Ciencia
                  </label>
                </fieldset>
          
                <fieldset>
                  <legend>Época</legend>
          
                  <label>
                    <input type="checkbox" name="epoca" value="moderno">
                    Moderno
                  </label>
          
                  <label>
                    <input type="checkbox" name="epoca" value="clasico">
                    Clásico
                  </label>
                </fieldset>
          
                <fieldset>
                  <legend>Fechas</legend>
          
                  <label>
                    Fecha de ingreso:
                    <input type="date" name="fecha_ingreso">
                  </label>
          
                  <label>
                    Fecha de edición:
                    <input type="date" name="fecha_edicion">
                  </label>
                </fieldset>
          
                <fieldset>
                  <legend>Descuentos</legend>
          
                  <label>
                    <input type="checkbox" name="descuento">
                    Solo con descuento
                  </label>
                </fieldset>
          
                <button type="submit">Aplicar filtros</button>
              </form>
            </details>
        </aside>

        <nav>
            <ul>
                <li><a href="#">ant</a></li>

    </main>

    <footer>
        <nav>

                <li><a href="/contacto.html">Contactos</a></li>

        </nav>
    </footer>
